<text x="214" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">1. Skapar beställning i SNOW</tspan>
</text>
<rect x="204" y="316" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="214" y="333" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">2. Tar emot ärendet</tspan>
</text>
<rect x="204" y="355" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="214" y="372" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">3. Kontrollerar mall/info</tspan>
</text>
<rect x="204" y="394" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="214" y="411" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">5. Import till ADO</tspan>
</text>
<rect x="204" y="433" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="214" y="450" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">6. Assignar till CSM</tspan>
</text>
<rect x="484" y="444" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="494" y="461" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="494" dy="0">7. Granskar, placerar i CAB</tspan>
<tspan x="494" dy="14">New</tspan>
</text>
<rect x="484" y="572" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="494" y="589" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="494" dy="0">8. Beslutar: göra beställning</tspan>
<tspan x="494" dy="14">eller ej</tspan>
</text>
<rect x="484" y="626" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="494" y="643" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="494" dy="0">10. Vid ja: initierar</tspan>
<tspan x="494" dy="14">estimering + lösning</tspan>
</text>
<rect x="764" y="700" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="717" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">11. Tar fram lösningsförslag +</tspan>
<tspan x="774" dy="14">estimat</tspan>
</text>
<rect x="764" y="572" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="589" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">12. Skickar underlag till CSM</tspan>
</text>
<rect x="764" y="424" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="441" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">13. Skapar offert</tspan>
</text>
<rect x="764" y="611" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="628" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">14. Granskar &amp; signerar offert</tspan>
</text>
<rect x="764" y="463" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="480" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">16. Presenterar offert för</tspan>
<tspan x="774" dy="14">kund</tspan>
</text>
<rect x="764" y="517" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="534" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">18. Informerar PO</tspan>
</text>
<rect x="764" y="188" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">17. Signerar offert</tspan>
</text>
<rect x="1044" y="572" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="589" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">19. Skapar</tspan>
<tspan x="1054" dy="14">implementeringsstory i ADO</tspan>
</text>
<rect x="1044" y="626" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="643" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">20. Planerar in story i</tspan>
<tspan x="1054" dy="14">release</tspan>
</text>
<rect x="1044" y="700" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="717" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">21. Drar arbete från backlog</tspan>
</text>
<rect x="1044" y="739" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="756" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">22. Genomför implementation</tspan>
</text>
<rect x="1044" y="778" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="795" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">23. Skapar leverans</tspan>
</text>
<rect x="1324" y="444" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="461" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">24. Koordinerar leverans med</tspan>
<tspan x="1334" dy="14">kund</tspan>
</text>
<rect x="1324" y="828" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="845" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">25. Levererar till kundtest</tspan>
</text>
<rect x="1324" y="867" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="884" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">27. Levererar till produktion</tspan>
</text>
<rect x="1324" y="188" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">26. Acceptanstest &amp; godkänner</tspan>
</text>
<rect x="1324" y="227" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="244" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">28. Godkänner slutleverans</tspan>
</text>
<rect x="1604" y="316" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="333" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">29. Avslutar SNOW-ärendet</tspan>
</text>
<rect x="1604" y="444" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="461" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">30. Skapar faktura</tspan>
</text>
<rect x="1604" y="483" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="500" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">31. Uppdaterar servicekontrakt</tspan>
</text>
<rect x="1604" y="522" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="539" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">32. Avslutar ADO-story</tspan>
</text>

