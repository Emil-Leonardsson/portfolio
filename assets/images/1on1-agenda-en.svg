<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1160" viewBox="0 0 800 1160">
  <rect width="800" height="1160" fill="#FFFFFF"/>
  <rect x="0" y="0" width="800" height="10" fill="#2F6F62"/>

  <text x="60" y="70" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#5B6A6A">TEMPLATE · 1-ON-1</text>
  <text x="60" y="112" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#1E2A32">1-on-1 Agenda</text>
  <text x="60" y="138" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6A6A">30 minutes · Emil Leonardsson</text>

  <line x1="60" y1="160" x2="740" y2="160" stroke="#DCDFD5" stroke-width="1"/>

  <text x="60" y="192" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6A6A">TEAM MEMBER</text>
  <line x1="60" y1="210" x2="380" y2="210" stroke="#DCDFD5" stroke-width="1"/>
  <text x="420" y="192" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6A6A">DATE</text>
  <line x1="420" y1="210" x2="740" y2="210" stroke="#DCDFD5" stroke-width="1"/>

  <!-- Step 1: Check-in -->
  <circle cx="76" cy="278" r="16" fill="#F7EDDA"/>
  <text x="76" y="283" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#C98A2E" text-anchor="middle">1</text>
  <text x="104" y="272" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Check-in</text>
  <text x="650" y="272" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">5 MIN</text>
  <text x="104" y="296" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#5B6A6A">
    <tspan x="104" dy="0">Start personal, not professional: how's family, the weekend, life?</tspan>
    <tspan x="104" dy="18">Then ease naturally into work. Trust is built before the agenda.</tspan>
  </text>

  <line x1="60" y1="336" x2="740" y2="336" stroke="#DCDFD5" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Step 2 -->
  <circle cx="76" cy="374" r="16" fill="#E4EEEA"/>
  <text x="76" y="379" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#2F6F62" text-anchor="middle">2</text>
  <text x="104" y="368" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Follow-up from last time</text>
  <text x="650" y="368" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">5 MIN</text>
  <text x="104" y="392" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#5B6A6A">What happened with what you said you'd do? What did we learn?</text>

  <line x1="60" y1="416" x2="740" y2="416" stroke="#DCDFD5" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Step 3: GROW main block -->
  <circle cx="76" cy="454" r="16" fill="#F7EDDA"/>
  <text x="76" y="459" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#C98A2E" text-anchor="middle">3</text>
  <text x="104" y="448" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Main topic (GROW conversation)</text>
  <text x="650" y="448" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">10 MIN</text>

  <rect x="104" y="468" width="590" height="200" rx="10" fill="#EEF0EA" stroke="#DCDFD5"/>

  <text x="128" y="498" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#2F6F62">Goal</text>
  <text x="128" y="518" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1E2A32">What do you want to get out of this conversation?</text>

  <text x="128" y="550" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#2F6F62">Reality</text>
  <text x="128" y="570" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1E2A32">Where do you stand today? What have you already tried?</text>

  <text x="128" y="602" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#C98A2E">Options</text>
  <text x="128" y="622" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1E2A32">What paths forward do you see, big or small?</text>

  <text x="128" y="644" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#C98A2E">Will</text>
  <text x="450" y="644" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1E2A32">What will you take away, and when?</text>

  <line x1="60" y1="692" x2="740" y2="692" stroke="#DCDFD5" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Step 4: Personal development & support -->
  <circle cx="76" cy="730" r="16" fill="#F7EDDA"/>
  <text x="76" y="735" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#C98A2E" text-anchor="middle">4</text>
  <text x="104" y="724" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Personal development &amp; support</text>
  <text x="650" y="724" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">5 MIN</text>
  <text x="104" y="748" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#5B6A6A">
    <tspan x="104" dy="0">Are you getting the development and support you need</tspan>
    <tspan x="104" dy="18">from your manager? If not, what level of support helps?</tspan>
  </text>

  <line x1="60" y1="792" x2="740" y2="792" stroke="#DCDFD5" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Step 5 -->
  <circle cx="76" cy="830" r="16" fill="#E4EEEA"/>
  <text x="76" y="835" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#2F6F62" text-anchor="middle">5</text>
  <text x="104" y="824" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Blockers &amp; support</text>
  <text x="650" y="824" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">3 MIN</text>
  <text x="104" y="848" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#5B6A6A">What's in your way right now, and what do you need from me to move forward?</text>

  <line x1="60" y1="872" x2="740" y2="872" stroke="#DCDFD5" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Step 6 -->
  <circle cx="76" cy="910" r="16" fill="#E4EEEA"/>
  <text x="76" y="915" font-family="IBM Plex Mono, Consolas, monospace" font-size="13" fill="#2F6F62" text-anchor="middle">6</text>
  <text x="104" y="904" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1E2A32">Next steps &amp; summary</text>
  <text x="650" y="904" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" fill="#5B6A6A" text-anchor="end">2 MIN</text>
  <text x="104" y="928" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#5B6A6A">Summarize the commitment out loud, both agree on what happens next.</text>

  <rect x="60" y="968" width="680" height="130" rx="10" fill="#FFFFFF" stroke="#DCDFD5" stroke-dasharray="4,4"/>
  <text x="84" y="998" font-family="IBM Plex Mono, Consolas, monospace" font-size="12" letter-spacing="1" fill="#5B6A6A">NOTES</text>
  <line x1="84" y1="1026" x2="716" y2="1026" stroke="#EEF0EA" stroke-width="1"/>
  <line x1="84" y1="1054" x2="716" y2="1054" stroke="#EEF0EA" stroke-width="1"/>
  <line x1="84" y1="1082" x2="716" y2="1082" stroke="#EEF0EA" stroke-width="1"/>

  <text x="60" y="1132" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6A6A">Emil Leonardsson · 1-on-1 template, built around the GROW model</text>
</svg>
