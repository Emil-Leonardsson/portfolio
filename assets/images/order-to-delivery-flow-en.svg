<tspan x="1614" dy="0">29. Closes SNOW ticket</tspan>
</text>
<rect x="1604" y="444" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="461" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">30. Creates invoice</tspan>
</text>
<rect x="1604" y="483" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="500" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">31. Updates service contract</tspan>
</text>
<rect x="1604" y="522" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1614" y="539" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1614" dy="0">32. Closes ADO story</tspan>
</text>

