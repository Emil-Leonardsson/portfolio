<rect x="204" y="188" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="214" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="214" dy="0">1. Creates order in SNOW</tspan>
</text>
