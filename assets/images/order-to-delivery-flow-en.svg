<tspan x="1054" dy="0">20. Schedules story into</tspan>
<tspan x="1054" dy="14">release</tspan>
</text>
<rect x="1044" y="700" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="717" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">21. Pulls work from backlog</tspan>
</text>
<rect x="1044" y="739" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="756" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">22. Carries out implementation</tspan>
</text>
<rect x="1044" y="778" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1054" y="795" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1054" dy="0">23. Creates delivery</tspan>
</text>
<rect x="1324" y="444" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
