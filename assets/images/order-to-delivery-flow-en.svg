<tspan x="1054" dy="0">19. Creates</tspan>
<tspan x="1054" dy="14">implementation story in ADO</tspan>
</text>
<rect x="1044" y="626" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
