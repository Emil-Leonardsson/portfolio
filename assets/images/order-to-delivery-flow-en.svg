<text x="774" y="534" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">18. Informs PO</tspan>
</text>
<rect x="764" y="188" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="774" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="774" dy="0">17. Signs quote</tspan>
</text>
<rect x="1044" y="572" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
