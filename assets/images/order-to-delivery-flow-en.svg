<tspan x="1334" dy="0">24. Coordinates delivery</tspan>
<tspan x="1334" dy="14">with customer</tspan>
</text>
<rect x="1324" y="828" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="845" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">25. Delivers to customer test</tspan>
</text>
<rect x="1324" y="867" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="884" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">27. Delivers to production</tspan>
</text>
<rect x="1324" y="188" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="205" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">26. Acceptance test &amp; approves</tspan>
</text>
<rect x="1324" y="227" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="1334" y="244" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="1334" dy="0">28. Approves final delivery</tspan>
</text>
<rect x="1604" y="316" width="252" height="31" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
