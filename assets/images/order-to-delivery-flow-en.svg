<text x="494" y="589" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="494" dy="0">8. Decides: proceed with order</tspan>
<tspan x="494" dy="14">or not</tspan>
</text>
<rect x="484" y="626" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
<text x="494" y="643" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1E2A32">
<tspan x="494" dy="0">10. If yes: initiates</tspan>
<tspan x="494" dy="14">estimation + solution</tspan>
</text>
<rect x="764" y="700" width="252" height="46" rx="6" fill="#F7EDDA" stroke="#C98A2E" stroke-width="1"/>
